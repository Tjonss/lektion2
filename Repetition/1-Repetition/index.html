<!DOCTYPE html>
<html lang="en">
<head>
  <!-- I <head> lägger man upp metadatan -->
    <!-- Lägger man även upp länkar till andra sidor -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Repetitions sida för lektion 1">
  <title>Repetition</title>
</head>
<body>
  
  <!-- Allt vi skriver ut i bodyn kommer vi se på våran hemsidan -->

  <!-- Blockelement sträcker sig hela vägen, hela bredden -->
  <div style="border: 1px solid black">DIV</div> 
  <div style="border: 1px solid black">DIV</div> 

  <br>

  <!-- Inlineelement -->
  <!-- Tar bara upp platsen den behöver -->
  <span style="border:1px solid black">SPAN</span>
  <span style="border:1px solid black">SPAN</span>
  
  <!-- Göra ett inline element till ett blockelement -->
  <!-- Kan inte lägga alla form av styling på inline element så vi kan behöva göra om de till blockelement -->
  <span style="border:1px solid black; display: block;">SPAN</span>


  <!-- Bra struktur i koden -->
<div>
  <div>
    <div>
      <div>
        <p>Hej</p>
      </div>
    </div>
    <div>
      <div>
        <div>Hej hej</div>
      </div>
    </div>
  </div>
</div>




<a href="https://google.com">google</a>
<a href="about.html" >about</a>


</body>
</html>
