<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulär</title>
</head>
<body>
  
<!-- Attributet Action="" talar om vart informationen ska gå någonstans -->
<!-- Method talar om vilken metod som används för att skicka datan, Default är "GET" -->

<!-- <form action="submitted.html" method="get" > -->
<form method="get" >
<!-- 
  GET - Skickar datan i URL:en 
  Den här funkar när man söker efter någonting eller hämtar information.
  Absolut INTE känslig information så som lösenord med mera.
 -->

 <!--
    <form action="submitted.html" method="post" > -->
<!-- 

  POST - Den lägger in datan i ett paket. En så kallad (body) Så det inte syns i URL:en 
        Mycket säkrare metod används när man skapar en eller registrerar något.
                        SE - PowerPoint HTMLochCSS
 -->



<!-- Koppla ihop en label med en input -->

 <label for="firstName">First name:</label>
 <input type="text" id="firstName" name="firstName" required placeholder="Enter first name">
 <br>
 <br>


<div>
<label for="email">Email:</label>
<input type="email" name="email" id="email" required placeholder="Enter e-mail">
</div>

<!-- Om man bara använder password blir det inte krypterat och syns i URL:en -->
<br>
<div>
  <label for="password">Password:</label>
  <input type="password" name="password" id="password" required>
</div>

<br>
<div>
  <label for="age">Age:</label>
  <input type="number" name="age" id="age" min="1" max="99">
</div>

 


<br>
<div>
  <label for="date">Date:</label>
  <input type="date" name="date" id="date">
</div>


<br>
<div>
  <label for="role">Role:</label>
  <select name="role" id="role">
  
    
<!-- Om man inte vill ha något startalternativ använd disabled och selected-->
    <option value="" disabled selected ></option>

    <option value="admin">Admin</option>
    <option value="user">User</option>
    <option value="opt-3">Guest</option>
  </select>

</div>


<div>
  <input type="radio" name="gender" id="male" value="male">
  <label for="male">Male</label>
  <br>
  <input type="radio" name="gender" id="female" value="female">
  <label for="female">Female</label>
  <br>
  <input type="radio" name="gender" id="other" value="other">
  <label for="other">Other</label>

</div>


<br>
<div>
  <input type="checkbox" name="terms" id="terms" required>
  <label for="terms">I have read and agree to the terms and conditions</label>
</div>
<!-- Checked - ha en ruta ikryssad från början -->

<div>
  <input type="checkbox" name="news" id="news" checked>
  <label for="news">I would like to subscribe to the newsletter</label>
</div>


<br>
<div>
  <label for="message">Message:</label> <br>
  <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter message..." ></textarea>
</div>



<input type="submit" value="Submit">
<button>Skicka</button>

<button type="button">Skicka</button>
<button type="reset">Reset</button>


</form>

</body>
</html>
